<title>ParkBridge · Wireframe Directions</title>

  html, body { margin:0; height:100%; background:#f0eee9; }

<body class="acc-cobalt sk-sketchy map-first">
<div id="root"></div>

<!-- roughen filter for the "Wobbly" sketch tweak -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="wf-rough">
    <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#2f63d6"/>
    <g fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round">
      <path d="M22 60c8 0 8-13 18-13s10 13 18 13 8-13 12-13" transform="translate(2 0)"/>
      <path d="M24 60v9M76 60v9M40 53v15M60 53v15"/>
    </g>
    <text x="50" y="86" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff" letter-spacing="1">PARK·BRIDGE</text>
  </svg>
</template>
